<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Govindas Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div style="text-align: center;">
        <h1 style="color: var(--primary); font-size: 2.5rem; margin-bottom: 1rem;">Govindas Store 🚩</h1>
        <div class="glass-card" style="padding: 2rem;">
            <p style="color: var(--text-muted);">Redirecting to your personalized experience...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        window.onload = () => {
            const token = localStorage.getItem('jwtToken');
            // Small delay to make it feel smooth
            setTimeout(() => {
                if (token) {
                    window.location.href = "store.html";
                } else {
                    window.location.href = "login.html";
                }
            }, 800);
        };
    </script>
</body>
</html>
