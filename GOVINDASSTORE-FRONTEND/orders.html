<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Orders | Govindas Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="top-nav">
        <h3 style="margin:0;">Order History 📜</h3>
        <a href="store.html" style="text-decoration:none; color: var(--primary); font-weight:bold;">Back to Store</a>
    </header>

    <div class="container" id="orders-container" style="max-width: 800px;">
        </div>

    <script src="js/app.js"></script>
    <script>
        window.onload = async () => {
            const res = await fetch(`${API_URL}/orders/history`, { headers: App.getHeaders() });
            if(res.ok) {
                const orders = await res.json();
                const container = document.getElementById('orders-container');
                
                if(orders.length === 0) {
                    container.innerHTML = "<div class='glass-card' style='text-align:center'>No orders found yet.</div>";
                    return;
                }

                container.innerHTML = orders.map(order => `
                    <div class="glass-card" style="margin-bottom: 1.5rem; border-left: 6px solid var(--secondary);">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <h4 style="margin:0;">Order #${order.id}</h4>
                                <p style="font-size: 0.85rem; color: var(--text-muted);">${new Date(order.orderDate).toLocaleDateString()}</p>
                            </div>
                            <span class="badge badge-good">${order.status || 'SUCCESS'}</span>
                        </div>
                        <hr style="border:0; border-top: 1px solid #f1f5f9; margin: 1rem 0;">
                        <p style="font-size: 0.9rem; margin-bottom: 0.5rem;"><b>Items:</b> ${order.items.map(i => i.productName).join(', ')}</p>
                        <p style="font-size: 1.1rem; color: var(--secondary); font-weight: bold; margin:0;">Total: ₹${order.totalAmount}</p>
                    </div>`).join('');
            }
        };
    </script>
</body>
</html>
