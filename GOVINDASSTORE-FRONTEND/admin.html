<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin | Govindas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="top-nav">
        <h3>Admin Dashboard 🛡️</h3>
        <a href="store.html" class="nav-links" style="text-decoration:none">Back to Store</a>
    </header>

    <div class="container" style="display: grid; grid-template-columns: 350px 1fr; gap: 2rem;">
        <div class="glass-card">
            <h4>Add New Product</h4>
            <input type="text" id="p-name" placeholder="Name" class="btn" style="width:100%; margin-bottom:1rem; border:1px solid #ddd">
            <textarea id="p-desc" placeholder="Description" class="btn" style="width:100%; height:80px; margin-bottom:1rem; border:1px solid #ddd"></textarea>
            <input type="number" id="p-price" placeholder="Price" class="btn" style="width:48%; border:1px solid #ddd">
            <input type="number" id="p-stock" placeholder="Stock" class="btn" style="width:48%; border:1px solid #ddd; margin-left:2%">
            <input type="text" id="p-image" placeholder="Image URL" class="btn" style="width:100%; margin-top:1rem; border:1px solid #ddd">
            <button class="btn btn-primary" style="margin-top:1rem" onclick="saveProduct()">Save Product</button>
        </div>

        <div>
            <div class="glass-card" style="margin-bottom:2rem">
                <h4>Inventory Status</h4>
                <div style="max-height:300px; overflow-y:auto">
                    <table id="stock-table">
                        <thead><tr><th>Product</th><th>Qty</th><th>Status</th></tr></thead>
                        <tbody id="stock-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass-card">
                <h4>Registered Users 👥</h4>
                <table id="user-table">
                    <thead><tr><th>Email</th><th>Role</th><th>Action</th></tr></thead>
                    <tbody id="user-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        window.onload = () => {
            loadInventory();
            loadUsers();
        };

        async function loadUsers() {
            const res = await fetch(`${API_URL}/admin/users`, { headers: App.getHeaders() });
            if(res.ok) {
                const users = await res.json();
                document.getElementById('user-body').innerHTML = users.map(u => `
                    <tr>
                        <td>${u.email}</td>
                        <td><span class="badge" style="background:#e0e7ff; color:#4338ca">${u.role}</span></td>
                        <td><button class="btn btn-danger" onclick="deleteUser(${u.id})">Delete</button></td>
                    </tr>`).join('');
            }
        }

        async function loadInventory() {
            const res = await fetch(`${API_URL}/products/store`);
            const products = await res.json();
            document.getElementById('stock-body').innerHTML = products.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td><b>${p.stockQuantity}</b></td>
                    <td><span class="badge ${p.stockQuantity < 5 ? 'badge-low' : 'badge-good'}">
                        ${p.stockQuantity < 5 ? 'LOW' : 'STABLE'}</span></td>
                </tr>`).join('');
        }

        async function saveProduct() {
            const product = {
                name: document.getElementById('p-name').value,
                description: document.getElementById('p-desc').value,
                price: parseFloat(document.getElementById('p-price').value),
                stockQuantity: parseInt(document.getElementById('p-stock').value),
                imageUrl: document.getElementById('p-image').value
            };
            const res = await fetch(`${API_URL}/products/admin/add-product`, {
                method: 'POST', headers: App.getHeaders(), body: JSON.stringify(product)
            });
            if(res.ok) { alert("Product Added!"); location.reload(); }
        }

        async function deleteUser(id) {
            if(!confirm("Delete user?")) return;
            const res = await fetch(`${API_URL}/admin/user/${id}`, { method: 'DELETE', headers: App.getHeaders() });
            if(res.ok) loadUsers();
        }
    </script>
</body>
</html>
